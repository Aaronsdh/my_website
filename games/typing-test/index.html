<!DOCTYPE html>
<html>

<head>

    <title>My Site</title>
    <link rel="stylesheet" href="typing-test.css">

</head>

<body>

    <main class="typing-shell">
        <header class="typing-hero">
            <div class="brand-mark" aria-hidden="true">
                <div class="typewriter-logo">
                    <span class="logo-paper"></span>
                    <span class="logo-eye logo-eye-left"></span>
                    <span class="logo-eye logo-eye-right"></span>
                    <span class="logo-smile"></span>
                    <span class="logo-body"></span>
                    <span class="logo-clip"></span>
                </div>
            </div>
            <div>
                <h1>Typing Test</h1>
                <p class="mascot-name">ClipType speed desk</p>
            </div>
        </header>

        <div class="app-grid">
            <section class="typing-panel" aria-label="Typing test">
                <div class="meter-row">
                    <p id="timer">Time: 60s</p>
                    <p id="status-message">Ready</p>
                </div>

                <p id="quote"></p>

                <div id="game-controls">
                    <input id="user-input" type="text" aria-label="Start typing here" placeholder="Start the test..." disabled>
                    <select id="test-duration" aria-label="Test duration">
                        <option value="30">30 seconds</option>
                        <option value="60" selected>1 minute</option>
                        <option value="120">2 minutes</option>
                    </select>
                    <button id="start-button">Start Test</button>
                </div>
            </section>

            <aside class="score-panel" aria-label="Scoreboard">
                <h2>Scoreboard</h2>
                <div class="score-card">
                    <span>Latest</span>
                    <strong id="latest-score">-- WPM</strong>
                    <small id="latest-detail">Finish a test to score.</small>
                </div>
                <ol id="leaderboard-list">
                    <li>No scores yet</li>
                </ol>
            </aside>

            <div class="keyboard" aria-hidden="true">
                <div class="keyboard-row">
                    <span class="key" data-key="q">Q</span>
                    <span class="key" data-key="w">W</span>
                    <span class="key" data-key="e">E</span>
                    <span class="key" data-key="r">R</span>
                    <span class="key" data-key="t">T</span>
                    <span class="key" data-key="y">Y</span>
                    <span class="key" data-key="u">U</span>
                    <span class="key" data-key="i">I</span>
                    <span class="key" data-key="o">O</span>
                    <span class="key" data-key="p">P</span>
                </div>
                <div class="keyboard-row keyboard-row-middle">
                    <span class="key" data-key="a">A</span>
                    <span class="key" data-key="s">S</span>
                    <span class="key" data-key="d">D</span>
                    <span class="key" data-key="f">F</span>
                    <span class="key" data-key="g">G</span>
                    <span class="key" data-key="h">H</span>
                    <span class="key" data-key="j">J</span>
                    <span class="key" data-key="k">K</span>
                    <span class="key" data-key="l">L</span>
                </div>
                <div class="keyboard-row keyboard-row-bottom">
                    <span class="key" data-key="z">Z</span>
                    <span class="key" data-key="x">X</span>
                    <span class="key" data-key="c">C</span>
                    <span class="key" data-key="v">V</span>
                    <span class="key" data-key="b">B</span>
                    <span class="key" data-key="n">N</span>
                    <span class="key" data-key="m">M</span>
                </div>
                <div class="keyboard-row">
                    <span class="key key-space" data-key=" ">Space</span>
                </div>
            </div>
        </div>
    </main>

    <script src="typing-test.js"></script>

</body>

</html>
