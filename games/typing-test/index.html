<!DOCTYPE html>
<html>

<head>
    <title>My Site</title>
    <link rel="stylesheet" href="typing-test.css">
</head>

<body>
    <h1>Typing Test</h1>
    <p>Test your typing speed and accuracy! Challenge yourself to type as fast
        and accurately as possible. Whether you're a beginner or a seasoned
        typist, this typing test is a great way to improve your skills while having fun. Give it a try:
        see how fast you can type!</p>
    <p id="quote"></p>
    <p id="status-message"></p>

    <div>
        <input type="text"  id="typing-input" aria-label="Start typing here...">
        <button id="start-test">Start Test</button>
    </div>

    <script src="typing-test.js"></script>
</body>

</html>
